<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LatamGPT — Ruta de Aprendizaje</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --bg2:      #f7f6f2;
    --bg3:      #f1f0eb;
    --text:     #1a1a18;
    --text2:    #5f5e5a;
    --text3:    #888780;
    --border:   rgba(0,0,0,0.10);
    --border2:  rgba(0,0,0,0.18);
    --radius:   10px;
    --radius-sm:6px;
    --accent:   #3C3489;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:    #1c1c1a;
      --bg2:   #242422;
      --bg3:   #2c2c2a;
      --text:  #e8e6df;
      --text2: #9c9a92;
      --text3: #6a6860;
      --border:rgba(255,255,255,0.09);
      --border2:rgba(255,255,255,0.16);
      --accent:#AFA9EC;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg2);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
  }
  .logo {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 99px;
    background: #EEEDFE;
    color: #3C3489;
    letter-spacing: 0.02em;
  }
  @media (prefers-color-scheme: dark) {
    .logo-pill { background: #3C3489; color: #CECBF6; }
  }
  .header-spacer { flex: 1; }
  .search-wrap {
    position: relative;
  }
  .search-wrap i {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--text3);
    pointer-events: none;
  }
  #search {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 7px 12px 7px 32px;
    font-size: 13px;
    color: var(--text);
    width: 220px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text3); }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px;
    padding: 4px 11px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--bg3); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: transparent; }
  @media (prefers-color-scheme: dark) { .filter-btn.active { color: #1c1c1a; } }

  /* ── Layout ── */
  .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

  .intro {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .intro-text h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .intro-text p { font-size: 13px; color: var(--text2); }
  .stats { display: flex; gap: 20px; flex-shrink: 0; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-n { font-size: 22px; font-weight: 600; color: var(--accent); }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── Sections ── */
  .section { margin-bottom: 16px; }
  .sec-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
    border: 0.5px solid;
    transition: opacity 0.15s;
  }
  .sec-header:hover { opacity: 0.85; }
  .sec-icon { font-size: 18px; }
  .sec-title { font-size: 15px; font-weight: 500; flex: 1; }
  .sec-pill {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 99px;
  }
  .sec-chevron { font-size: 14px; transition: transform 0.2s; color: var(--text3); }
  .sec-header.open .sec-chevron { transform: rotate(180deg); }
  .sec-body { display: none; padding-top: 6px; }
  .sec-body.open { display: block; }

  /* Section color themes */
  .s-datos  { border-color: #9FE1CB; background: rgba(29,158,117,0.06); }
  .s-datos .sec-title  { color: #085041; }
  .s-datos .sec-pill   { background: #9FE1CB; color: #04342C; }
  .s-pre    { border-color: #85B7EB; background: rgba(55,138,221,0.06); }
  .s-pre .sec-title    { color: #0C447C; }
  .s-pre .sec-pill     { background: #B5D4F4; color: #042C53; }
  .s-post   { border-color: #AFA9EC; background: rgba(83,74,183,0.06); }
  .s-post .sec-title   { color: #3C3489; }
  .s-post .sec-pill    { background: #CECBF6; color: #26215C; }
  .s-synth  { border-color: #FAC775; background: rgba(186,117,23,0.06); }
  .s-synth .sec-title  { color: #633806; }
  .s-synth .sec-pill   { background: #FAC775; color: #412402; }
  .s-bench  { border-color: #ED93B1; background: rgba(212,83,126,0.06); }
  .s-bench .sec-title  { color: #72243E; }
  .s-bench .sec-pill   { background: #F4C0D1; color: #4B1528; }
  .s-models { border-color: #97C459; background: rgba(99,153,34,0.06); }
  .s-models .sec-title { color: #27500A; }
  .s-models .sec-pill  { background: #C0DD97; color: #173404; }
  .s-fund   { border-color: #94A3B8; background: rgba(100,116,139,0.06); }
  .s-fund .sec-title   { color: #1e293b; }
  .s-fund .sec-pill    { background: #CBD5E1; color: #1e293b; }

  @media (prefers-color-scheme: dark) {
    .s-datos  { border-color: #085041; background: rgba(8,80,65,0.15); }
    .s-datos .sec-title { color: #9FE1CB; }
    .s-datos .sec-pill  { background: #085041; color: #9FE1CB; }
    .s-pre    { border-color: #0C447C; background: rgba(12,68,124,0.15); }
    .s-pre .sec-title   { color: #B5D4F4; }
    .s-pre .sec-pill    { background: #0C447C; color: #B5D4F4; }
    .s-post   { border-color: #3C3489; background: rgba(60,52,137,0.15); }
    .s-post .sec-title  { color: #AFA9EC; }
    .s-post .sec-pill   { background: #3C3489; color: #CECBF6; }
    .s-synth  { border-color: #633806; background: rgba(99,56,6,0.15); }
    .s-synth .sec-title { color: #FAC775; }
    .s-synth .sec-pill  { background: #633806; color: #FAC775; }
    .s-bench  { border-color: #72243E; background: rgba(114,36,62,0.15); }
    .s-bench .sec-title { color: #F4C0D1; }
    .s-bench .sec-pill  { background: #72243E; color: #F4C0D1; }
    .s-models { border-color: #27500A; background: rgba(39,80,10,0.15); }
    .s-models .sec-title { color: #C0DD97; }
    .s-models .sec-pill  { background: #27500A; color: #C0DD97; }
    .s-fund   { border-color: #334155; background: rgba(51,65,85,0.15); }
    .s-fund .sec-title   { color: #94A3B8; }
    .s-fund .sec-pill    { background: #334155; color: #94A3B8; }
  }

  /* ── Track label ── */
  .track-lbl {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text3); padding: 10px 4px 4px;
  }

  /* ── Cards ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 8px;
    padding-bottom: 4px;
  }
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card.hidden { display: none; }

  .card-top { display: flex; gap: 9px; align-items: flex-start; margin-bottom: 6px; }
  .level-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .lv-basic    { background: #E1F5EE; color: #085041; }
  .lv-core     { background: #E6F1FB; color: #0C447C; }
  .lv-advanced { background: #EEEDFE; color: #3C3489; }
  .lv-sota     { background: #FAEEDA; color: #633806; }
  .lv-latam    { background: #FAECE7; color: #712B13; }
  .lv-sat      { background: #FCEBEB; color: #791F1F; }
  @media (prefers-color-scheme: dark) {
    .lv-basic    { background:#04342C; color:#9FE1CB; }
    .lv-core     { background:#042C53; color:#B5D4F4; }
    .lv-advanced { background:#26215C; color:#AFA9EC; }
    .lv-sota     { background:#412402; color:#FAC775; }
    .lv-latam    { background:#4A1B0C; color:#F5C4B3; }
    .lv-sat      { background:#501313; color:#F7C1C1; }
  }

  .card-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .card-desc  { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
  .tags       { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .tag {
    font-size: 10px; padding: 1px 6px;
    border-radius: 4px; background: var(--bg3);
    border: 0.5px solid var(--border); color: var(--text3);
  }
  .links { display: flex; flex-wrap: wrap; gap: 5px; }
  .plink, .rlink {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    text-decoration: none; transition: border-color 0.1s;
  }
  .plink { color: #185FA5; }
  .rlink { color: var(--text2); }
  .plink:hover, .rlink:hover { border-color: var(--accent); }
  @media (prefers-color-scheme: dark) { .plink { color: #85B7EB; } }

  .no-results {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 14px; display: none;
  }
  .no-results i { font-size: 32px; display: block; margin-bottom: 8px; }

  footer {
    text-align: center; padding: 20px;
    font-size: 12px; color: var(--text3);
    border-top: 0.5px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>

  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;" id="filters">

</main>

<script>

  {

        { level:"advanced", title:"TruthfulQA",
          desc:"817 preguntas donde modelos más grandes tienden a ser MÁS incorrectos por imitar creencias humanas falsas. Mide honestidad vs imitación. Fenómeno contraintuitivo de anti-scaling.",
          tags:["alucinaciones","honestidad","anti-scaling","safety","imitation"],
          papers:[{l:"TruthfulQA (Lin et al., 2021)",u:"https://arxiv.org/abs/2109.07958"}],
          res:[{l:"TruthfulQA (HF)",u:"https://huggingface.co/datasets/truthfulqa/truthful_qa"}]},
      ]},
      { label:"Multilingüe y Latam", items:[
        { level:"latam", title:"Trueque Benchmark",
          desc:"500 preguntas culturales sobre 20 países latinoamericanos. Diseñado por CENIA. Evalúa conocimiento cultural que MMLU no captura.",
          tags:["cultura","20 países","500 preguntas","CENIA"],
          papers:[],
          res:[{l:"LatamGPT (HuggingFace)",u:"https://huggingface.co/latamgpt"}]},
        { level:"latam", title:"LatamQA (EACL 2026)",
          desc:"Benchmark QA para español latinoamericano. Importante para diagnósticos de chat template.",
          tags:["español","QA","EACL 2026"],
          papers:[{l:"LatamQA (EACL 2026)",u:"https://arxiv.org/abs/2406.07228"}],res:[]},
        { level:"latam", title:"MGSM — Matemáticas multilingüe",
          desc:"GSM8K traducido a 11 idiomas incluido español. Mide si el razonamiento matemático se mantiene en Latam. Expone brechas idiomáticas en modelos que parecen buenos en inglés.",
          tags:["multilingual","matemáticas","español","GSM8K","11 idiomas"],
          papers:[{l:"LMs are Multilingual CoT Reasoners (Shi et al., 2022)",u:"https://arxiv.org/abs/2210.03057"}],
          res:[{l:"MGSM (HF)",u:"https://huggingface.co/datasets/juletxara/mgsm"}]},
        { level:"advanced", title:"Global-MMLU",
          desc:"MMLU traducido a 42+ idiomas incluido español y portugués. Detectar brechas de representación.",
          tags:["multilingüe","42 idiomas","es/pt"],
          papers:[{l:"Global-MMLU (Singh et al., 2024)",u:"https://arxiv.org/abs/2412.03304"}],
          res:[{l:"Global-MMLU (HF)",u:"https://huggingface.co/datasets/CohereForAI/Global-MMLU"}]},
        { level:"advanced", title:"IberBench / IberLEF",
          desc:"Suite de evaluación para lenguas ibéricas (es, pt, ca, gl). NLU, NER, sentiment.",
          tags:["ibérico","NLU","NER","es/pt"],
          papers:[{l:"IberBench (García-Ferrero et al., 2025)",u:"https://arxiv.org/abs/2504.17897"}],res:[]},
        { level:"sota", title:"Pitfalls: contaminación y prompt sensitivity",
          desc:"El formato del prompt mueve scores ±10pp. Cómo detectar contaminación. Crítico para resultados reproducibles.",
          tags:["contamination","prompt sensitivity","reproducibility"],
          papers:[{l:"Contamination detection (Golchin & Surdeanu, 2023)",u:"https://arxiv.org/abs/2310.16789"},{l:"NLP eval in trouble (Sainz et al., 2023)",u:"https://arxiv.org/abs/2310.18018"},{l:"MMLU prompt sensitivity (Gema et al., 2024)",u:"https://arxiv.org/abs/2402.07765"}],
          res:[{l:"lm-evaluation-harness",u:"https://github.com/EleutherAI/lm-evaluation-harness"}]},
      ]},
    ]
  },
];

const levelLabel = { basic:"Básico", core:"Core", advanced:"Avanzado", sota:"SOTA 2026", latam:"LatamGPT", sat:"Saturado" };
let activeLevel = "all";

function buildCard(item) {
  const el = document.createElement("div");
  el.className = "card";
  el.dataset.level = item.level;
  el.dataset.text = (item.title + " " + item.desc + " " + (item.tags||[]).join(" ") + " " + (item.papers||[]).map(p=>p.l).join(" ")).toLowerCase();

  const badgeCls = "lv-" + item.level;
  const badgeTxt = levelLabel[item.level] || item.level;

  let linksHtml = "";
  (item.papers||[]).forEach(p => {
    linksHtml += `<a class="plink" href="${p.u}" target="_blank" rel="noopener"><i class="ti ti-file-text" style="font-size:11px"></i>${p.l}</a>`;
  });
  (item.res||[]).forEach(r => {
    linksHtml += `<a class="rlink" href="${r.u}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:11px"></i>${r.l}</a>`;
  });

  el.innerHTML = `
    <div class="card-top">
      <span class="level-badge ${badgeCls}">${badgeTxt}</span>
      <span class="card-title">${item.title}</span>
    </div>
    <div class="card-desc">${item.desc}</div>
    ${item.tags?.length ? `<div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>` : ""}
    ${linksHtml ? `<div class="links">${linksHtml}</div>` : ""}
  `;
  return el;
}

function buildSection(sec) {
  const wrap = document.createElement("div");
  wrap.className = "section";
  wrap.dataset.id = sec.id;

  const hdr = document.createElement("div");
  hdr.className = `sec-header ${sec.cls}`;
  hdr.innerHTML = `<i class="ti ${sec.icon} sec-icon" aria-hidden="true"></i><span class="sec-title">${sec.title}</span><span class="sec-pill">${sec.pill}</span><i class="ti ti-chevron-down sec-chevron"></i>`;

  const body = document.createElement("div");
  body.className = "sec-body";

  sec.tracks.forEach(track => {
    const lbl = document.createElement("div");
    lbl.className = "track-lbl";
    lbl.textContent = track.label;
    body.appendChild(lbl);

    const grid = document.createElement("div");
    grid.className = "cards-grid";
    track.items.forEach(item => grid.appendChild(buildCard(item)));
    body.appendChild(grid);
  });

  hdr.onclick = () => {
    const open = body.classList.toggle("open");
    hdr.classList.toggle("open", open);
  };

  wrap.appendChild(hdr);
  wrap.appendChild(body);
  return wrap;
}

const root = document.getElementById("sections-root");
SECTIONS.forEach(sec => root.appendChild(buildSection(sec)));

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const noRes = document.getElementById("no-results");
  let anyVisible = false;

  document.querySelectorAll(".card").forEach(card => {
    const levelMatch = activeLevel === "all" || card.dataset.level === activeLevel;
    const textMatch = !q || card.dataset.text.includes(q);
    const show = levelMatch && textMatch;
    card.classList.toggle("hidden", !show);
    if (show) anyVisible = true;
  });

  document.querySelectorAll(".section").forEach(sec => {
    const hasVisible = [...sec.querySelectorAll(".card")].some(c => !c.classList.contains("hidden"));
    sec.style.display = hasVisible ? "" : "none";
    if (hasVisible && (q || activeLevel !== "all")) {
      sec.querySelector(".sec-body").classList.add("open");
      sec.querySelector(".sec-header").classList.add("open");
    }
  });

  noRes.style.display = anyVisible ? "none" : "block";
}

document.getElementById("search").addEventListener("input", applyFilters);

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeLevel = btn.dataset.level;
  applyFilters();
});
</script>
